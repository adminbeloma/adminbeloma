<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos Diarios · Playeras Beloma</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<!-- SheetJS para exportar Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  :root{
    --azul:#1d4ed8;
    --azul-suave:#eef3ff;
    --gris-borde:#dde3ee;
    --gris-texto:#3a4356;
    --gris-fondo:#f6f8fc;
    --verde:#16a34a;
    --rojo:#dc2626;
    --naranja:#d97706;
    --blanco:#ffffff;
    --radio:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background:var(--gris-fondo);
    color:var(--gris-texto);
  }
  header{
    background:var(--azul);
    color:#fff;
    padding:18px 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
  }
  header h1{margin:0;font-size:1.25rem;font-weight:600;}
  header .fecha-hoy{font-size:.85rem;opacity:.9;}

  .contenedor{max-width:1200px;margin:0 auto;padding:20px 16px 60px;}

  .tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .tab-btn{
    padding:9px 16px;border-radius:8px;border:1px solid var(--gris-borde);
    background:#fff;cursor:pointer;font-size:.9rem;font-weight:500;color:var(--gris-texto);
  }
  .tab-btn.activo{background:var(--azul);color:#fff;border-color:var(--azul);}

  .panel{display:none;}
  .panel.activo{display:block;}

  .card{
    background:#fff;border:1px solid var(--gris-borde);border-radius:var(--radio);
    padding:18px 20px;margin-bottom:18px;
  }
  .card h2{margin:0 0 14px;font-size:1rem;color:var(--azul);}

  .grid-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:14px;}
  label{font-size:.78rem;font-weight:600;color:#6b7280;display:block;margin-bottom:4px;}
  input, select, textarea{
    width:100%;padding:8px 10px;border:1px solid var(--gris-borde);border-radius:7px;
    font-size:.88rem;font-family:inherit;background:#fff;color:var(--gris-texto);
  }
  input:focus, select:focus, textarea:focus{outline:2px solid var(--azul);outline-offset:1px;}

  table{width:100%;border-collapse:collapse;font-size:.85rem;}
  th, td{padding:8px 10px;border-bottom:1px solid var(--gris-borde);text-align:left;}
  th{background:var(--azul-suave);color:var(--azul);font-weight:600;font-size:.78rem;text-transform:uppercase;}
  tr:hover td{background:#fafbff;}

  .items-tabla th, .items-tabla td{padding:6px 8px;}
  .btn{
    padding:9px 16px;border:none;border-radius:8px;cursor:pointer;font-size:.86rem;font-weight:600;
  }
  .btn-primario{background:var(--azul);color:#fff;}
  .btn-primario:hover{background:#1a3fc0;}
  .btn-secundario{background:#fff;color:var(--azul);border:1px solid var(--azul);}
  .btn-verde{background:var(--verde);color:#fff;}
  .btn-rojo{background:#fde8e8;color:var(--rojo);}
  .btn-chico{padding:5px 10px;font-size:.78rem;}

  .fila-acciones{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;}

  .resumen-dia{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
  .stat{
    background:#fff;border:1px solid var(--gris-borde);border-radius:var(--radio);
    padding:14px 18px;min-width:130px;
  }
  .stat .num{font-size:1.5rem;font-weight:700;color:var(--azul);}
  .stat .lbl{font-size:.75rem;color:#6b7280;text-transform:uppercase;}

  .badge{padding:2px 9px;border-radius:20px;font-size:.72rem;font-weight:600;}
  .badge-local{background:#e0f2fe;color:#0369a1;}
  .badge-foraneo{background:#fef3c7;color:#b45309;}
  .badge-ml{background:#fff3d6;color:#946200;}
  .badge-shopify{background:#e6f4ea;color:#1e7e34;}
  .badge-tn{background:#f3e8ff;color:#7e22ce;}
  .badge-otro{background:#eef2f7;color:#475569;}

  .vacio{text-align:center;color:#94a3b8;padding:30px 10px;font-size:.9rem;}
  .msg{padding:10px 14px;border-radius:8px;font-size:.85rem;margin-bottom:12px;display:none;}
  .msg.ok{background:#e7f8ee;color:#127a3d;display:block;}
  .msg.error{background:#fde8e8;color:var(--rojo);display:block;}

  .filtros{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px;}
  .filtros > div{min-width:150px;}

  @media (max-width:640px){
    header{flex-direction:column;align-items:flex-start;}
    .grid-form{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>

<header>
  <h1>📦 Pedidos Diarios · Todos los Canales</h1>
  <div class="fecha-hoy" id="fechaHoyTxt"></div>
</header>

<div class="contenedor">

  <div class="tabs">
    <button class="tab-btn activo" data-tab="captura">➕ Capturar pedido</button>
    <button class="tab-btn" data-tab="hoy">📋 Pedidos de hoy</button>
    <button class="tab-btn" data-tab="historico">🕘 Histórico</button>
  </div>

  <div id="msgGlobal" class="msg"></div>

  <!-- ===================== CAPTURA ===================== -->
  <div class="panel activo" id="panel-captura">
    <div class="card">
      <h2>Datos del pedido</h2>
      <div class="grid-form">
        <div>
          <label>Folio / N° de pedido</label>
          <input type="text" id="fFolio" placeholder="Ej. ML-123456 o local">
        </div>
        <div>
          <label>Canal</label>
          <select id="fCanal">
            <option value="Local">Local (mostrador)</option>
            <option value="MercadoLibre">MercadoLibre</option>
            <option value="Shopify">Shopify (playerasbeloma.com)</option>
            <option value="TiendaNube">Tienda Nube (Dead Threads)</option>
            <option value="Foraneo">Foráneo (WhatsApp/redes)</option>
            <option value="Otro">Otro</option>
          </select>
        </div>
        <div>
          <label>Tipo</label>
          <select id="fTipoCliente">
            <option value="Local">Local</option>
            <option value="Foraneo">Foráneo</option>
          </select>
        </div>
        <div>
          <label>Nombre del cliente</label>
          <input type="text" id="fCliente" placeholder="Nombre libre">
        </div>
        <div>
          <label>Fecha del pedido</label>
          <input type="date" id="fFecha">
        </div>
      </div>

      <h2>Prendas del pedido</h2>
      <table class="items-tabla" id="tablaItems">
        <thead>
          <tr>
            <th style="width:14%">Género</th>
            <th style="width:12%">Talla</th>
            <th style="width:14%">Color</th>
            <th style="width:32%">Descripción</th>
            <th style="width:10%">Cant.</th>
            <th style="width:8%"></th>
          </tr>
        </thead>
        <tbody id="itemsBody"></tbody>
      </table>
      <div class="fila-acciones">
        <button class="btn btn-secundario btn-chico" onclick="agregarFilaItem()">+ Agregar prenda</button>
      </div>

      <div class="fila-acciones" style="margin-top:18px;">
        <button class="btn btn-primario" onclick="guardarPedido()">Guardar pedido</button>
        <button class="btn btn-secundario" onclick="limpiarFormulario()">Limpiar</button>
      </div>
    </div>
  </div>

  <!-- ===================== HOY ===================== -->
  <div class="panel" id="panel-hoy">
    <div class="resumen-dia" id="resumenHoy"></div>
    <div class="card">
      <h2>Pedidos de hoy</h2>
      <div id="tablaHoyCont"><div class="vacio">Cargando...</div></div>
      <div class="fila-acciones">
        <button class="btn btn-verde" onclick="exportarExcel('hoy')">⬇️ Exportar Excel (hoy)</button>
      </div>
    </div>
  </div>

  <!-- ===================== HISTORICO ===================== -->
  <div class="panel" id="panel-historico">
    <div class="card">
      <h2>Buscar en histórico</h2>
      <div class="filtros">
        <div>
          <label>Desde</label>
          <input type="date" id="hDesde">
        </div>
        <div>
          <label>Hasta</label>
          <input type="date" id="hHasta">
        </div>
        <div>
          <label>Cliente (contiene)</label>
          <input type="text" id="hCliente" placeholder="Ej. Pérez">
        </div>
        <div>
          <label>Canal</label>
          <select id="hCanal">
            <option value="">Todos</option>
            <option value="Local">Local</option>
            <option value="MercadoLibre">MercadoLibre</option>
            <option value="Shopify">Shopify</option>
            <option value="TiendaNube">Tienda Nube</option>
            <option value="Foraneo">Foráneo</option>
            <option value="Otro">Otro</option>
          </select>
        </div>
        <div>
          <button class="btn btn-primario" onclick="buscarHistorico()">Buscar</button>
        </div>
      </div>
      <div id="tablaHistCont"><div class="vacio">Elige un rango de fechas y presiona Buscar.</div></div>
      <div class="fila-acciones" id="accionesHist" style="display:none;">
        <button class="btn btn-verde" onclick="exportarExcel('historico')">⬇️ Exportar Excel (resultados)</button>
      </div>
    </div>
  </div>

</div>

<script>
/* =====================================================
   CONFIGURACIÓN FIREBASE
   Reemplaza esto con la MISMA config que usas en
   adminbeloma / kiosco / mayoreo (proyecto "adminbeloma").
   Firestore: northamerica-south1
===================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyAvhG8RuytIv9rjsILWF8twyZeqTwfJ10I",
  authDomain: "adminbeloma.firebaseapp.com",
  projectId: "adminbeloma",
  storageBucket: "adminbeloma.firebasestorage.app",
  messagingSenderId: "542305826307",
  appId: "1:542305826307:web:4d97b65719bf534eff0036"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const COLECCION = "pedidosDiarios"; // colección independiente, no toca "ventas"

let itemIdCounter = 0;

/* ---------- utilidades de fecha ---------- */
function hoyISO(){
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function mostrarFechaHoy(){
  const opciones = {weekday:'long', year:'numeric', month:'long', day:'numeric'};
  document.getElementById("fechaHoyTxt").textContent =
    new Date().toLocaleDateString('es-MX', opciones);
}
function mostrarMsg(texto, tipo){
  const el = document.getElementById("msgGlobal");
  el.textContent = texto;
  el.className = "msg " + tipo;
  setTimeout(()=>{ el.className = "msg"; }, 3500);
}

/* ---------- tabs ---------- */
document.querySelectorAll(".tab-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("activo"));
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("activo"));
    btn.classList.add("activo");
    document.getElementById("panel-"+btn.dataset.tab).classList.add("activo");
    if(btn.dataset.tab === "hoy") cargarPedidosHoy();
  });
});

/* ---------- filas dinámicas de prendas ---------- */
function agregarFilaItem(valores){
  const id = "item_"+(itemIdCounter++);
  const tr = document.createElement("tr");
  tr.id = id;
  tr.innerHTML = `
    <td><select class="it-genero">
          <option value="Caballero">Caballero</option>
          <option value="Dama">Dama</option>
          <option value="Niño">Niño</option>
          <option value="Niña">Niña</option>
          <option value="Unisex">Unisex</option>
        </select></td>
    <td><input type="text" class="it-talla" placeholder="Ch/M/G/XL"></td>
    <td><input type="text" class="it-color" placeholder="Color"></td>
    <td><input type="text" class="it-desc" placeholder="Diseño / descripción"></td>
    <td><input type="number" class="it-cant" min="1" value="1"></td>
    <td><button class="btn btn-rojo btn-chico" onclick="document.getElementById('${id}').remove()">✕</button></td>
  `;
  document.getElementById("itemsBody").appendChild(tr);
  if(valores){
    tr.querySelector(".it-genero").value = valores.genero || "Caballero";
    tr.querySelector(".it-talla").value = valores.talla || "";
    tr.querySelector(".it-color").value = valores.color || "";
    tr.querySelector(".it-desc").value = valores.descripcion || "";
    tr.querySelector(".it-cant").value = valores.cantidad || 1;
  }
}

function leerItems(){
  const filas = document.querySelectorAll("#itemsBody tr");
  const items = [];
  filas.forEach(tr=>{
    items.push({
      genero: tr.querySelector(".it-genero").value,
      talla: tr.querySelector(".it-talla").value.trim(),
      color: tr.querySelector(".it-color").value.trim(),
      descripcion: tr.querySelector(".it-desc").value.trim(),
      cantidad: parseInt(tr.querySelector(".it-cant").value) || 1
    });
  });
  return items;
}

function limpiarFormulario(){
  document.getElementById("fFolio").value = "";
  document.getElementById("fCliente").value = "";
  document.getElementById("fCanal").value = "Local";
  document.getElementById("fTipoCliente").value = "Local";
  document.getElementById("fFecha").value = hoyISO();
  document.getElementById("itemsBody").innerHTML = "";
  agregarFilaItem();
}

/* auto-ajustar tipo cliente según canal */
document.getElementById("fCanal").addEventListener("change", (e)=>{
  const canal = e.target.value;
  const tipoSel = document.getElementById("fTipoCliente");
  if(canal === "Local") tipoSel.value = "Local";
  else tipoSel.value = "Foraneo";
});

/* ---------- guardar pedido ---------- */
async function guardarPedido(){
  const folio = document.getElementById("fFolio").value.trim();
  const canal = document.getElementById("fCanal").value;
  const tipoCliente = document.getElementById("fTipoCliente").value;
  const cliente = document.getElementById("fCliente").value.trim();
  const fecha = document.getElementById("fFecha").value || hoyISO();
  const items = leerItems().filter(it => it.descripcion || it.talla || it.color);

  if(!cliente){ mostrarMsg("Falta el nombre del cliente.", "error"); return; }
  if(items.length === 0){ mostrarMsg("Agrega al menos una prenda.", "error"); return; }

  const totalPiezas = items.reduce((s,it)=> s + it.cantidad, 0);

  try{
    await db.collection(COLECCION).add({
      folio: folio || "(sin folio)",
      canal,
      tipoCliente,
      cliente,
      fecha,
      items,
      totalPiezas,
      creadoEn: firebase.firestore.FieldValue.serverTimestamp()
    });
    mostrarMsg("Pedido guardado ✔", "ok");
    limpiarFormulario();
  }catch(err){
    console.error(err);
    mostrarMsg("Error al guardar: " + err.message, "error");
  }
}

/* ---------- badges de canal ---------- */
function badgeCanal(canal){
  const map = {
    Local:"badge-local", Foraneo:"badge-foraneo", MercadoLibre:"badge-ml",
    Shopify:"badge-shopify", TiendaNube:"badge-tn", Otro:"badge-otro"
  };
  return `<span class="badge ${map[canal]||'badge-otro'}">${canal}</span>`;
}

/* ---------- pedidos de hoy ---------- */
let pedidosHoyCache = [];

async function cargarPedidosHoy(){
  const cont = document.getElementById("tablaHoyCont");
  cont.innerHTML = '<div class="vacio">Cargando...</div>';
  try{
    const hoy = hoyISO();
    const snap = await db.collection(COLECCION).where("fecha","==",hoy).get();
    pedidosHoyCache = [];
    snap.forEach(doc=> pedidosHoyCache.push({id:doc.id, ...doc.data()}));
    pintarResumen(pedidosHoyCache, "resumenHoy");
    pintarTablaPedidos(pedidosHoyCache, cont);
  }catch(err){
    cont.innerHTML = `<div class="vacio">Error: ${err.message}</div>`;
  }
}

function pintarResumen(lista, contenedorId){
  const totalPedidos = lista.length;
  const totalPiezas = lista.reduce((s,p)=> s + (p.totalPiezas||0), 0);
  const porCanal = {};
  lista.forEach(p=> porCanal[p.canal] = (porCanal[p.canal]||0)+1);
  const canalesTxt = Object.entries(porCanal).map(([c,n])=>`${c}: ${n}`).join(" · ") || "—";

  document.getElementById(contenedorId).innerHTML = `
    <div class="stat"><div class="num">${totalPedidos}</div><div class="lbl">Pedidos</div></div>
    <div class="stat"><div class="num">${totalPiezas}</div><div class="lbl">Piezas totales</div></div>
    <div class="stat" style="min-width:220px;"><div class="lbl" style="margin-bottom:6px;">Por canal</div><div style="font-size:.82rem;">${canalesTxt}</div></div>
  `;
}

function pintarTablaPedidos(lista, contenedor){
  if(lista.length === 0){
    contenedor.innerHTML = '<div class="vacio">No hay pedidos registrados.</div>';
    return;
  }
  let html = `<table><thead><tr>
    <th>Folio</th><th>Canal</th><th>Cliente</th><th>Tipo</th><th>Piezas</th><th>Detalle</th>
  </tr></thead><tbody>`;
  lista.forEach(p=>{
    const detalle = (p.items||[]).map(it=>
      `${it.cantidad}× ${it.genero} ${it.talla} ${it.color} — ${it.descripcion}`
    ).join("<br>");
    html += `<tr>
      <td>${p.folio}</td>
      <td>${badgeCanal(p.canal)}</td>
      <td>${p.cliente}</td>
      <td>${p.tipoCliente}</td>
      <td>${p.totalPiezas}</td>
      <td style="font-size:.78rem;color:#6b7280;">${detalle}</td>
    </tr>`;
  });
  html += "</tbody></table>";
  contenedor.innerHTML = html;
}

/* ---------- histórico ---------- */
let historicoCache = [];

async function buscarHistorico(){
  const desde = document.getElementById("hDesde").value;
  const hasta = document.getElementById("hHasta").value;
  const clienteFiltro = document.getElementById("hCliente").value.trim().toLowerCase();
  const canalFiltro = document.getElementById("hCanal").value;
  const cont = document.getElementById("tablaHistCont");

  if(!desde || !hasta){
    mostrarMsg("Elige fecha 'Desde' y 'Hasta'.", "error");
    return;
  }

  cont.innerHTML = '<div class="vacio">Buscando...</div>';
  try{
    let query = db.collection(COLECCION).where("fecha",">=",desde).where("fecha","<=",hasta);
    const snap = await query.get();
    let lista = [];
    snap.forEach(doc=> lista.push({id:doc.id, ...doc.data()}));

    if(canalFiltro) lista = lista.filter(p=> p.canal === canalFiltro);
    if(clienteFiltro) lista = lista.filter(p=> (p.cliente||"").toLowerCase().includes(clienteFiltro));

    lista.sort((a,b)=> (a.fecha < b.fecha ? 1 : -1));
    historicoCache = lista;

    if(lista.length === 0){
      cont.innerHTML = '<div class="vacio">Sin resultados para ese filtro.</div>';
      document.getElementById("accionesHist").style.display = "none";
      return;
    }

    let html = `<table><thead><tr>
      <th>Fecha</th><th>Folio</th><th>Canal</th><th>Cliente</th><th>Tipo</th><th>Piezas</th>
    </tr></thead><tbody>`;
    lista.forEach(p=>{
      html += `<tr>
        <td>${p.fecha}</td><td>${p.folio}</td><td>${badgeCanal(p.canal)}</td>
        <td>${p.cliente}</td><td>${p.tipoCliente}</td><td>${p.totalPiezas}</td>
      </tr>`;
    });
    html += "</tbody></table>";
    cont.innerHTML = html;
    document.getElementById("accionesHist").style.display = "flex";
  }catch(err){
    cont.innerHTML = `<div class="vacio">Error: ${err.message}</div>`;
  }
}

/* ---------- exportar a Excel ---------- */
function exportarExcel(origen){
  const lista = origen === "hoy" ? pedidosHoyCache : historicoCache;
  if(!lista || lista.length === 0){
    mostrarMsg("No hay datos para exportar.", "error");
    return;
  }

  // Una fila por CADA PRENDA (línea de item), con datos del pedido repetidos
  const filas = [];
  lista.forEach(p=>{
    (p.items||[]).forEach(it=>{
      filas.push({
        "Fecha": p.fecha,
        "Folio": p.folio,
        "Canal": p.canal,
        "Tipo Cliente": p.tipoCliente,
        "Cliente": p.cliente,
        "Género": it.genero,
        "Talla": it.talla,
        "Color": it.color,
        "Descripción": it.descripcion,
        "Cantidad": it.cantidad
      });
    });
  });

  const ws = XLSX.utils.json_to_sheet(filas);
  ws['!cols'] = [
    {wch:12},{wch:16},{wch:14},{wch:12},{wch:22},
    {wch:10},{wch:8},{wch:10},{wch:30},{wch:9}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Pedidos");

  const nombreArchivo = origen === "hoy"
    ? `Pedidos_${hoyISO()}.xlsx`
    : `Pedidos_Historico_${document.getElementById("hDesde").value}_a_${document.getElementById("hHasta").value}.xlsx`;

  XLSX.writeFile(wb, nombreArchivo);
}

/* ---------- init ---------- */
mostrarFechaHoy();
limpiarFormulario();
cargarPedidosHoy();
</script>
</body>
</html>
